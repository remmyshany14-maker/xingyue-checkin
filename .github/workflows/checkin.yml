name: daily-checkin

on:
  schedule:
    - cron: "0 0 * * *"
  workflow_dispatch:

jobs:
  run:
    runs-on: ubuntu-latest

    steps:
      - uses: actions/checkout@v3

      - uses: actions/setup-python@v4
        with:
          python-version: "3.10"

      - run: pip install requests

      # ⭐ 加随机延迟启动（关键）
      - name: Random startup delay
        run: |
          python -c "import random,time; t=random.randint(10,300); print('sleep',t); time.sleep(t)"

      - name: Run checkin
        env:
          SECRET_TOKENS: ${{ secrets.SECRET_TOKENS }}
        run: python checkin.py
