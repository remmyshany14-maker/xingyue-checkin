name: daily-checkin

on:
  schedule:
    - cron: "0 0 * * *"
  workflow_dispatch:

jobs:
  run:
    runs-on: ubuntu-latest

    steps:
      - uses: actions/checkout@v3

      - uses: actions/setup-python@v4
        with:
          python-version: "3.10"

      - run: pip install requests

      - name: Random delay
        run: |
          python -c "import random,time; time.sleep(random.randint(10,300))"

      - name: Run checkin
        env:
          SECRET_TOKENS: ${{ secrets.SECRET_TOKENS }}
          EMAIL_USER: ${{ secrets.EMAIL_USER }}
          EMAIL_PASS: ${{ secrets.EMAIL_PASS }}
          EMAIL_TO: ${{ secrets.EMAIL_TO }}
        run: python checkin.py
