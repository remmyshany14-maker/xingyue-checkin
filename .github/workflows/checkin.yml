name: daily-checkin

on:
  schedule:
    - cron: "0 0 * * *"   # UTC 0点（北京时间 8点）
  workflow_dispatch:

jobs:
  run:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout
        uses: actions/checkout@v3

      - name: Setup Python
        uses: actions/setup-python@v4
        with:
          python-version: "3.10"

      - name: Install dependencies
        run: pip install requests

      - name: Random delay
        run: |
          python -c "import random,time; t=random.randint(10,300); print('sleep', t); time.sleep(t)"

      - name: Run checkin
        env:
          SECRET_TOKENS: ${{ secrets.SECRET_TOKENS }}
          EMAIL_USER: ${{ secrets.EMAIL_USER }}
          EMAIL_PASS: ${{ secrets.EMAIL_PASS }}
          EMAIL_TO: ${{ secrets.EMAIL_TO }}
        run: python checkin.py
