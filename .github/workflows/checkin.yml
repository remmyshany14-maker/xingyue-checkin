```
steps:
  - name: Checkout
    uses: actions/checkout@v4

  - name: Setup Python
    uses: actions/setup-python@v5
    with:
      python-version: "3.10"

  - name: Install dependencies
    run: pip install requests pycryptodome

  # 小随机启动延迟（避免固定行为）
  - name: Random startup delay
    run: |
      python -c "import random,time; t=random.uniform(3,15); print('sleep:',t); time.sleep(t)"

  - name: Run checkin
    env:
      SECRET_TOKENS: ${{ secrets.SECRET_TOKENS }}
      EMAIL_USER: ${{ secrets.EMAIL_USER }}
      EMAIL_PASS: ${{ secrets.EMAIL_PASS }}
      EMAIL_TO: ${{ secrets.EMAIL_TO }}
    run: python checkin.py

  - name: Upload dashboard data
    run: echo "dashboard updated"

